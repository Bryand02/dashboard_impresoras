services:
  backend:
    build:
      context: ./backend
    container_name: printer-hub-backend
    ports:
      - "4300:4300"
    environment:
      PORT: 4300
      CORS_ORIGIN: http://localhost:5173
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

  frontend:
    build:
      context: ./frontend
    container_name: printer-hub-frontend
    ports:
      - "5180:5173"
    environment:
      VITE_API_URL: http://localhost:4300/api
      VITE_WS_URL: ws://localhost:4300/ws
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0
